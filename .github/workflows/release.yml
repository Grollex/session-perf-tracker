name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v, for example 0.1.2"
        required: true
        type: string
      release_notes:
        description: "Release notes"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".Trim().TrimStart("v")
            $notes = "${{ inputs.release_notes }}"
          } else {
            $version = "${env:GITHUB_REF_NAME}".Trim().TrimStart("v")
            $notes = "Session Perf Tracker $version"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must look like 0.1.2. Pre-release labels are not supported by the current Windows installer metadata."
          }

          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Session Perf Tracker $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          "notes=$notes" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer and update manifest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $installerBaseUrl = "https://github.com/${{ github.repository }}/releases/download/v$version"
          .\scripts\package-windows.ps1 `
            -Version $version `
            -BuildInstaller `
            -InstallerBaseUrl $installerBaseUrl `
            -ReleaseNotes "${{ steps.version.outputs.notes }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Session Perf Tracker ${{ steps.version.outputs.version }}
          body: ${{ steps.version.outputs.notes }}
          files: |
            artifacts/release/installer/SessionPerfTracker-${{ steps.version.outputs.version }}-win-x64-setup.exe
            artifacts/release/update/version.json
